apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-booking
  template:
    metadata:
      labels:
        app: hotel-booking
    spec:
      containers:
      - name: hotel-app
        image: your-dockerhub-username/hotel-booking-system:latest
        ports:
        - containerPort: 8080
